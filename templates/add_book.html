{% extends "base.html" %}
{% block title %}Add Book{% endblock %}
{% block content %}
<main class="container">
  <section class="card form-card">
    <h2 class="page-title">Add New Book</h2>
    <p class="muted">Enter complete catalog details to register a new title.</p>

    <form method="POST" class="form-grid" style="margin-top:10px;">
      <div class="field">
        <label for="acc">Accession Number</label>
        <input name="acc" id="acc" required>
      </div>
      <div class="field">
        <label for="title">Title</label>
        <input name="title" id="title" required>
      </div>
      <div class="field">
        <label for="author">Author</label>
        <input name="author" id="author" required>
      </div>
      <div class="field">
        <label for="category">Category</label>
        <input name="category" id="category" required>
      </div>
      <div class="field full">
        <label for="copies">Copies</label>
        <input name="copies" id="copies" type="number" min="1" required>
      </div>
      <div class="full actions">
        <button type="submit">Save Book</button>
        <a href="/admin" class="btn btn-ghost">Back to Admin</a>
      </div>
    </form>
  </section>
</main>
{% endblock %}
